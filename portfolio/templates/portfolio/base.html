{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Amafood Product & Wine{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #0a2540 !important; padding: 15px 0; }
        .navbar-brand { font-size: 24px; font-weight: bold; color: #d4af37 !important; }
        .nav-link { color: white !important; font-size: 16px; }
        .nav-link:hover { color: #d4af37 !important; }
        .brand-corner { position: fixed; bottom: 20px; left: 20px; background: #0a2540; color: #d4af37; padding: 15px 25px; border-radius: 50px; font-weight: bold; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>
    <!-- Brand Corner Badge -->
    <div class="brand-corner">AMA</div>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-wine-glass-alt me-2"></i>Amafood Product & Wine
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#wine">Wine</a></li>
                    <li class="nav-item"><a class="nav-link" href="#chips">Chips</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer style="background: #0a2540; color: white; text-align: center; padding: 20px; margin-top: 50px;">
        <p>&copy; 2026 Amafood Product & Wine. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
